        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased
        }

        body {
            background: #ffffff;
            color: #1a1a2e;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .ty-wrap {
            max-width: 600px
        }

        .ty-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #d9000d;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            animation: popIn .6s cubic-bezier(.16, 1, .3, 1) both;
        }

        .ty-icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #fff;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .ty-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            color: #0a0a0f;
        }

        .ty-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
            animation: fadeUp .8s .2s cubic-bezier(.16, 1, .3, 1) both;
        }

        .ty-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #555a68;
            margin-bottom: 2.5rem;
            animation: fadeUp .8s .35s cubic-bezier(.16, 1, .3, 1) both;
        }

        .ty-btn {
            display: inline-flex;
            align-items: center;
            padding: 1rem 2.2rem;
            border-radius: 100px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            background: #0a0a0f;
            color: #fff;
            text-decoration: none;
            transition: all .35s cubic-bezier(.16, 1, .3, 1);
            animation: fadeUp .8s .5s cubic-bezier(.16, 1, .3, 1) both;
        }

        .ty-btn:hover {
            background: #222;
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .18);
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes fadeUp {
            from {
                transform: translateY(30px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }
    </style>

            fissare un appuntamento e discutere della partnership.</p>

    </div>
